<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memo Map</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-plus" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14" />
      </symbol>
      <symbol id="icon-note" viewBox="0 0 24 24">
        <path d="M15 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z" />
        <path d="M14 3v5h5M8 13h8M8 17h5" />
      </symbol>
      <symbol id="icon-folder" viewBox="0 0 24 24">
        <path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z" />
      </symbol>
      <symbol id="icon-target" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="8" />
        <circle cx="12" cy="12" r="3" />
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3" />
      </symbol>
      <symbol id="icon-zoom-in" viewBox="0 0 24 24">
        <circle cx="10.5" cy="10.5" r="7.5" />
        <path d="m16 16 5 5M10.5 7v7M7 10.5h7" />
      </symbol>
      <symbol id="icon-layout" viewBox="0 0 24 24">
        <path d="M12 3v6M12 15v6M5 9h14M5 15h14" />
        <rect x="4" y="4" width="5" height="5" rx="1" />
        <rect x="15" y="4" width="5" height="5" rx="1" />
        <rect x="4" y="15" width="5" height="5" rx="1" />
        <rect x="15" y="15" width="5" height="5" rx="1" />
      </symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24">
        <path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15" />
        <path d="M10 11v6M14 11v6" />
      </symbol>
      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7" />
        <path d="m16 16 4 4" />
      </symbol>
      <symbol id="icon-mic" viewBox="0 0 24 24">
        <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z" />
        <path d="M5 11a7 7 0 0 0 14 0M12 18v3M8 21h8" />
      </symbol>
      <symbol id="icon-spark" viewBox="0 0 24 24">
        <path d="M12 2l1.7 5.1L19 9l-5.3 1.9L12 16l-1.7-5.1L5 9l5.3-1.9Z" />
        <path d="M19 15l.9 2.4L22 18l-2.1.6L19 21l-.9-2.4L16 18l2.1-.6Z" />
        <path d="M5 14l.7 1.8L7 16l-1.3.2L5 18l-.7-1.8L3 16l1.3-.2Z" />
      </symbol>
      <symbol id="icon-chevron" viewBox="0 0 24 24">
        <path d="m9 18 6-6-6-6" />
      </symbol>
      <symbol id="icon-download" viewBox="0 0 24 24">
        <path d="M12 3v12M7 10l5 5 5-5" />
        <path d="M5 20h14" />
      </symbol>
      <symbol id="icon-upload" viewBox="0 0 24 24">
        <path d="M12 21V9M7 14l5-5 5 5" />
        <path d="M5 4h14" />
      </symbol>
    </svg>

    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">M</div>
          <div>
            <h1>Memo Map</h1>
            <p>인터랙티브 마인드맵 메모 보드</p>
          </div>
        </div>

        <div class="toolbar" aria-label="빠른 작업">
          <button class="icon-button with-text" type="button" data-action="focus-category" title="카테고리 추가">
            <svg><use href="#icon-folder"></use></svg>
            <span>카테고리</span>
          </button>
          <button class="icon-button with-text" type="button" data-action="add-note" title="메모 추가">
            <svg><use href="#icon-note"></use></svg>
            <span>메모</span>
          </button>
          <button class="icon-button with-text" type="button" data-action="add-detail" title="선택한 메모에 세부사항 추가">
            <svg><use href="#icon-plus"></use></svg>
            <span>세부사항</span>
          </button>
          <button class="icon-button" type="button" data-action="arrange" title="자동 정렬" aria-label="자동 정렬">
            <svg><use href="#icon-layout"></use></svg>
          </button>
          <button class="icon-button" type="button" data-action="center-map" title="가운데 보기" aria-label="가운데 보기">
            <svg><use href="#icon-target"></use></svg>
          </button>
          <button class="icon-button" type="button" data-action="zoom-selection" title="선택 항목 확대" aria-label="선택 항목 확대">
            <svg><use href="#icon-zoom-in"></use></svg>
          </button>
          <button class="icon-button with-text" type="button" data-action="save-board" title="로컬 드라이브에 저장">
            <svg><use href="#icon-download"></use></svg>
            <span>저장</span>
          </button>
          <button class="icon-button with-text" type="button" data-action="load-board" title="로컬 드라이브에서 불러오기">
            <svg><use href="#icon-upload"></use></svg>
            <span>불러오기</span>
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="side-panel left-panel" aria-label="카테고리와 메모">
          <div class="panel-expanded-content">
            <div class="panel-topline">
              <span>보드 목록</span>
              <button class="panel-toggle-button" type="button" data-panel-toggle="left" title="왼쪽 창 접기" aria-label="왼쪽 창 접기">
                <svg><use href="#icon-chevron"></use></svg>
              </button>
            </div>

            <section class="panel-section">
              <div class="section-heading">
                <h2>카테고리</h2>
                <span id="categoryCount" class="count-pill">0</span>
              </div>
              <form id="categoryForm" class="inline-form" autocomplete="off">
                <input id="categoryInput" name="category" type="text" maxlength="32" placeholder="새 카테고리" />
                <button class="icon-button" type="submit" title="추가" aria-label="카테고리 추가">
                  <svg><use href="#icon-plus"></use></svg>
                </button>
              </form>
              <div id="categoryList" class="category-list"></div>
            </section>

            <section class="panel-section">
              <div class="section-heading">
                <h2>메모</h2>
                <span id="noteCount" class="count-pill">0</span>
              </div>
              <form id="noteForm" class="inline-form" autocomplete="off">
                <input id="noteInput" name="note" type="text" maxlength="48" placeholder="새 메모" />
                <button class="icon-button" type="submit" title="추가" aria-label="메모 추가">
                  <svg><use href="#icon-plus"></use></svg>
                </button>
              </form>
              <button class="secondary-button full-width-button" type="button" data-action="add-detail" title="선택한 메모에 세부사항 추가">
                <svg><use href="#icon-plus"></use></svg>
                <span>세부사항 추가</span>
              </button>
              <div id="noteList" class="note-list"></div>
            </section>
          </div>

          <div class="collapsed-rail left-rail" aria-label="핵심 작업">
            <button class="panel-toggle-button" type="button" data-panel-toggle="left" title="왼쪽 창 펼치기" aria-label="왼쪽 창 펼치기">
              <svg><use href="#icon-chevron"></use></svg>
            </button>
            <button class="rail-button" type="button" data-action="add-category" title="카테고리 추가">
              <svg><use href="#icon-folder"></use></svg>
              <span>카테고리+</span>
            </button>
            <button class="rail-button" type="button" data-action="add-note" title="메모 추가">
              <svg><use href="#icon-note"></use></svg>
              <span>메모+</span>
            </button>
            <button class="rail-button" type="button" data-action="add-detail" title="세부사항 추가">
              <svg><use href="#icon-plus"></use></svg>
              <span>세부+</span>
            </button>
            <span class="rail-divider"></span>
            <button class="rail-button icon-only" type="button" data-action="save-board" title="저장" aria-label="저장">
              <svg><use href="#icon-download"></use></svg>
            </button>
            <button class="rail-button icon-only" type="button" data-action="load-board" title="불러오기" aria-label="불러오기">
              <svg><use href="#icon-upload"></use></svg>
            </button>
            <button class="rail-button icon-only" type="button" data-action="arrange" title="정렬" aria-label="정렬">
              <svg><use href="#icon-layout"></use></svg>
            </button>
            <button class="rail-button icon-only" type="button" data-action="center-map" title="가운데 보기" aria-label="가운데 보기">
              <svg><use href="#icon-target"></use></svg>
            </button>
            <button class="rail-button icon-only" type="button" data-action="zoom-selection" title="선택 확대" aria-label="선택 확대">
              <svg><use href="#icon-zoom-in"></use></svg>
            </button>
          </div>
        </aside>

        <section class="map-panel" aria-label="마인드맵">
          <div class="map-controls">
            <div class="segmented-control" role="tablist" aria-label="보기 범위">
              <button type="button" data-view="all" class="active" role="tab" aria-selected="true">전체</button>
              <button type="button" data-view="active" role="tab" aria-selected="false">선택</button>
            </div>

            <label class="search-box">
              <svg><use href="#icon-search"></use></svg>
              <input id="searchInput" type="search" placeholder="검색" />
            </label>

            <label class="zoom-control">
              <span>확대</span>
              <input id="zoomInput" type="range" min="5" max="220" step="5" value="100" />
            </label>
          </div>

          <div id="mapViewport" class="map-viewport">
            <div id="threeBackdrop" class="three-backdrop" aria-hidden="true"></div>
            <div id="mapSpace" class="map-space">
              <div id="mapContent" class="map-content">
                <svg id="edgeLayer" class="edge-layer" aria-hidden="true"></svg>
                <div id="nodeLayer" class="node-layer"></div>
              </div>
            </div>
          </div>
        </section>

        <aside class="side-panel inspector-panel" aria-label="선택 항목 편집">
          <div class="inspector-topline">
            <span>옵션</span>
            <button class="panel-toggle-button" type="button" data-panel-toggle="right" title="옵션 창 접기" aria-label="옵션 창 접기">
              <svg><use href="#icon-chevron"></use></svg>
            </button>
          </div>
          <div id="inspector"></div>
          <div class="collapsed-rail right-rail" aria-label="옵션 창">
            <button class="panel-toggle-button" type="button" data-panel-toggle="right" title="옵션 창 펼치기" aria-label="옵션 창 펼치기">
              <svg><use href="#icon-chevron"></use></svg>
            </button>
            <span>옵션</span>
          </div>
        </aside>
      </main>
    </div>

    <input id="localFileInput" class="visually-hidden-file" type="file" accept="application/json,.json" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
